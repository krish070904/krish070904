<svg width="1200" height="360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="duskSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#05030f"/>
      <stop offset="45%" stop-color="#1a0a2e"/>
      <stop offset="75%" stop-color="#5c1a4a"/>
      <stop offset="100%" stop-color="#d6304a"/>
    </linearGradient>
    <radialGradient id="sunDisc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="55%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#ff5e62" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="cityFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241038"/>
      <stop offset="100%" stop-color="#140820"/>
    </linearGradient>
    <linearGradient id="cityNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0614"/>
      <stop offset="100%" stop-color="#05030a"/>
    </linearGradient>
    <linearGradient id="neonText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ef2ff">
        <animate attributeName="stop-color" values="#5ef2ff;#ff5ec4;#5ef2ff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff5ec4">
        <animate attributeName="stop-color" values="#ff5ec4;#5ef2ff;#ff5ec4" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="360" fill="url(#duskSky)"/>

  <!-- Rising sun -->
  <circle cx="600" cy="190" r="120" fill="url(#sunDisc)" opacity="0.85"/>
  <circle cx="600" cy="190" r="58" fill="#ffd166" opacity="0.9">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- sun rays -->
  <g stroke="#ffd166" stroke-width="2" opacity="0.35">
    <line x1="600" y1="60" x2="600" y2="20"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></line>
    <line x1="500" y1="80" x2="470" y2="50"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.4s" repeatCount="indefinite"/></line>
    <line x1="700" y1="80" x2="730" y2="50"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.6s" repeatCount="indefinite"/></line>
    <line x1="440" y1="140" x2="395" y2="125"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.2s" repeatCount="indefinite"/></line>
    <line x1="760" y1="140" x2="805" y2="125"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.8s" repeatCount="indefinite"/></line>
  </g>

  <!-- Distant city skyline -->
  <g fill="url(#cityFar)" opacity="0.85">
    <rect x="20" y="220" width="40" height="120"/>
    <rect x="70" y="190" width="30" height="150"/>
    <rect x="110" y="235" width="50" height="105"/>
    <rect x="930" y="210" width="35" height="130"/>
    <rect x="975" y="240" width="45" height="100"/>
    <rect x="1030" y="200" width="30" height="140"/>
    <rect x="1070" y="225" width="55" height="115"/>
    <rect x="1135" y="195" width="35" height="145"/>
  </g>

  <!-- Near city skyline with glowing windows -->
  <g fill="url(#cityNear)">
    <rect x="0" y="260" width="55" height="100"/>
    <rect x="60" y="230" width="40" height="130"/>
    <rect x="105" y="270" width="60" height="90"/>
    <rect x="175" y="245" width="35" height="115"/>
    <rect x="1015" y="255" width="45" height="105"/>
    <rect x="1065" y="225" width="40" height="135"/>
    <rect x="1110" y="265" width="55" height="95"/>
    <rect x="1170" y="240" width="30" height="120"/>
  </g>
  <!-- window lights -->
  <g fill="#5ef2ff">
    <rect x="10" y="280" width="4" height="6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="22" y="300" width="4" height="6"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></rect>
    <rect x="40" y="290" width="4" height="6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="70" y="250" width="4" height="6"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="82" y="270" width="4" height="6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="1030" y="270" width="4" height="6" fill="#ff5ec4"><animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite"/></rect>
    <rect x="1045" y="290" width="4" height="6" fill="#ff5ec4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></rect>
    <rect x="1080" y="250" width="4" height="6" fill="#ff5ec4"><animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></rect>
    <rect x="1120" y="285" width="4" height="6" fill="#ff5ec4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Water reflection strip -->
  <rect x="0" y="340" width="1200" height="20" fill="#05030a" opacity="0.6"/>
  <ellipse cx="600" cy="345" rx="90" ry="6" fill="#ffd166" opacity="0.25">
    <animate attributeName="rx" values="90;105;90" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating paper lanterns -->
  <g>
    <g transform="translate(250,90)">
      <animateTransform attributeName="transform" type="translate" values="250,90;250,100;250,90" dur="4s" repeatCount="indefinite" additive="sum"/>
      <line x1="0" y1="-14" x2="0" y2="0" stroke="#ff5ec4" stroke-width="1" opacity="0.6"/>
      <rect x="-12" y="0" width="24" height="30" rx="6" fill="#ff5ec4" opacity="0.85"/>
      <rect x="-12" y="11" width="24" height="8" fill="#ffd166" opacity="0.5"/>
    </g>
    <g transform="translate(880,130)">
      <animateTransform attributeName="transform" type="translate" values="880,130;880,142;880,130" dur="5s" repeatCount="indefinite" additive="sum"/>
      <line x1="0" y1="-14" x2="0" y2="0" stroke="#5ef2ff" stroke-width="1" opacity="0.6"/>
      <rect x="-11" y="0" width="22" height="28" rx="6" fill="#5ef2ff" opacity="0.8"/>
      <rect x="-11" y="10" width="22" height="7" fill="#fff3c4" opacity="0.5"/>
    </g>
    <g transform="translate(1000,90)">
      <animateTransform attributeName="transform" type="translate" values="1000,90;1000,100;1000,90" dur="4.5s" repeatCount="indefinite" additive="sum"/>
      <line x1="0" y1="-12" x2="0" y2="0" stroke="#ff5ec4" stroke-width="1" opacity="0.6"/>
      <rect x="-9" y="0" width="18" height="24" rx="5" fill="#ff5ec4" opacity="0.8"/>
    </g>
  </g>

  <!-- Koi fish swimming -->
  <g opacity="0.8">
    <path d="M0,0 q14,-8 28,0 q-14,8 -28,0 Z" fill="#ff8a3d">
      <animateTransform attributeName="transform" type="translate" values="-40,300;1240,300" dur="14s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 q12,-7 24,0 q-12,7 -24,0 Z" fill="#ffd166" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" values="-40,320;1240,320" dur="18s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Rain -->
  <g stroke="#5ef2ff" stroke-width="1" opacity="0.25">
    <line x1="100" y1="0" x2="80" y2="40"><animate attributeName="y1" values="-40;360" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y2" values="0;400" dur="1.4s" repeatCount="indefinite"/></line>
    <line x1="320" y1="0" x2="300" y2="40"><animate attributeName="y1" values="-60;340" dur="1.7s" repeatCount="indefinite"/><animate attributeName="y2" values="-20;380" dur="1.7s" repeatCount="indefinite"/></line>
    <line x1="540" y1="0" x2="520" y2="40"><animate attributeName="y1" values="-30;370" dur="1.5s" repeatCount="indefinite"/><animate attributeName="y2" values="10;410" dur="1.5s" repeatCount="indefinite"/></line>
    <line x1="760" y1="0" x2="740" y2="40"><animate attributeName="y1" values="-50;350" dur="1.6s" repeatCount="indefinite"/><animate attributeName="y2" values="-10;390" dur="1.6s" repeatCount="indefinite"/></line>
    <line x1="980" y1="0" x2="960" y2="40"><animate attributeName="y1" values="-20;380" dur="1.3s" repeatCount="indefinite"/><animate attributeName="y2" values="20;420" dur="1.3s" repeatCount="indefinite"/></line>
  </g>

  <!-- Title with neon outline -->
  <text x="600" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="800"
        fill="url(#neonText)" text-anchor="middle" filter="url(#neonGlow)" letter-spacing="3">KRISHNA WABLE</text>

  <text x="600" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="17"
        fill="#cdeeff" text-anchor="middle" opacity="0.85" letter-spacing="2">
    FULL-STACK DEVELOPER 　 AI / ML ENGINEER 　 LLM &amp; VOICE SYSTEMS
  </text>

  <!-- katakana-style decorative accents -->
  <text x="60" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#ff5ec4" opacity="0.5">起</text>
  <text x="1110" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#5ef2ff" opacity="0.5">動</text>
</svg>
